appId: keybase.ios
---
- runFlow: ../subflows/escape-to-tabs.yaml
- tapOn:
    text: "People"
- extendedWaitUntil:
    visible:
      id: "people-feed"
    timeout: 3000
- takeScreenshot: tests/results/ios-debug/people-feed
# Navigate to own profile — tap username in the feed if visible
- runFlow:
    when:
      visible:
        text: "${KB_SMOKE_USER}"
    commands:
      - tapOn:
          text: "${KB_SMOKE_USER}"
          index: 0
      - extendedWaitUntil:
          visible:
            id: "profile-page"
          timeout: 10000
      - takeScreenshot: tests/results/ios-debug/people-profile
      - tapOn:
          id: "backButton"
