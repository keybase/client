appId: keybase.ios
---
- runFlow: ../subflows/escape-to-tabs.yaml
- tapOn:
    text: "Teams"
    retryTapIfNoChange: false
- extendedWaitUntil:
    visible:
      id: "teams-list"
    timeout: 3000
- runFlow:
    when:
      visible:
        id: "teams-row"
    commands:
      - tapOn:
          id: "teams-row"
          index: 0
      # Members tab is the default — wait for its content
      - extendedWaitUntil:
          visible:
            id: "teams-member-list"
          timeout: 5000
      - takeScreenshot: tests/results/ios-debug/teams-inner-members

      # Settings tab
      - tapOn:
          text: "Settings"
      - extendedWaitUntil:
          visible:
            id: "teams-settings-tab"
          timeout: 3000
      - takeScreenshot: tests/results/ios-debug/teams-inner-settings

      # Bots tab
      - tapOn:
          text: "Bots"
      - extendedWaitUntil:
          visible:
            id: "teams-bots-tab"
          timeout: 3000
      - takeScreenshot: tests/results/ios-debug/teams-inner-bots

      # Channels tab — only present for big teams or admins
      - runFlow:
          when:
            visible:
              text: "Channels"
          commands:
            - tapOn:
                text: "Channels"
            - extendedWaitUntil:
                visible:
                  id: "teams-channel-list"
                timeout: 3000
            - takeScreenshot: tests/results/ios-debug/teams-inner-channels

      - tapOn:
          id: "backButton"
