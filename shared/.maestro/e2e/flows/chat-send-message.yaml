appId: keybase.ios
---
# Flow: Send a message to KB_SMOKE_USER.
# Run with: maestro test --env KB_SMOKE_USER=youruser chat-send-message.yaml
# The first conversation in the inbox must be with KB_SMOKE_USER.

- runFlow: ../../subflows/navigate-to-chat.yaml

- extendedWaitUntil:
    visible:
      id: "chat-inbox-list"
    timeout: 5000

- tapOn:
    id: "chat-inbox-row"
    index: 0

- extendedWaitUntil:
    visible:
      id: "chat-message-list"
    timeout: 5000

- tapOn:
    id: "chat-input"

- inputText: "e2e-test-${KB_SMOKE_USER}"

- tapOn:
    text: "Send"

- assertVisible:
    text: "e2e-test-${KB_SMOKE_USER}"
