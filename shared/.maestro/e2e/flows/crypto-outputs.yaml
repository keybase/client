appId: keybase.ios
---
- runFlow: ../subflows/escape-to-tabs.yaml
- tapOn:
    text: "More"
- scrollUntilVisible:
    element:
      text: ".*Crypto"
    direction: up
    timeout: 3000
- tapOn:
    text: ".*Crypto"
    retryTapIfNoChange: false
- extendedWaitUntil:
    visible:
      id: "crypto-input"
    timeout: 3000

# Encrypt → output renders
- tapOn:
    id: "crypto-nav-encryptTab"
- extendedWaitUntil:
    visible:
      id: "crypto-encrypt-input"
    timeout: 3000
- tapOn:
    id: "crypto-encrypt-input"
- inputText: "hello e2e"
- tapOn:
    id: "crypto-run-button"
- extendedWaitUntil:
    visible:
      id: "crypto-output"
    timeout: 10000
- takeScreenshot: tests/results/ios-debug/crypto-outputs-encrypt
- tapOn:
    text: "Done"
- tapOn:
    id: "backButton"

# Sign → output renders
- tapOn:
    id: "crypto-nav-signTab"
- extendedWaitUntil:
    visible:
      id: "crypto-sign-input"
    timeout: 3000
- tapOn:
    id: "crypto-sign-input"
- inputText: "hello e2e"
- tapOn:
    id: "crypto-run-button"
- extendedWaitUntil:
    visible:
      id: "crypto-output"
    timeout: 10000
- takeScreenshot: tests/results/ios-debug/crypto-outputs-sign
- tapOn:
    text: "Done"
- tapOn:
    id: "backButton"
