appId: keybase.ios
---
- runFlow: ../subflows/escape-to-tabs.yaml
# Navigate via Teams first to avoid ambiguity: "Chat" also appears in the More tab menu
- tapOn:
    text: "Teams"
- tapOn:
    text: "Chat"
- extendedWaitUntil:
    visible:
      id: "chat-inbox-list"
    timeout: 5000
- takeScreenshot: tests/results/ios-debug/chat-conversation-inbox
- runFlow:
    when:
      visible:
        id: "chat-inbox-row"
    commands:
      - tapOn:
          id: "chat-inbox-row"
          index: 0
      - extendedWaitUntil:
          visible:
            id: "chat-message-list"
          timeout: 5000
      - takeScreenshot: tests/results/ios-debug/chat-conversation-open
      - tapOn:
          id: "backButton"
      - extendedWaitUntil:
          visible:
            id: "chat-inbox-list"
          timeout: 5000
