appId: keybase.ios
---
- runFlow: ../subflows/escape-to-tabs.yaml
- tapOn:
    text: "More"
- extendedWaitUntil:
    visible:
      id: "settings-account"
    timeout: 3000

# Advanced
- tapOn:
    text: "Advanced"
- extendedWaitUntil:
    visible:
      id: "settings-advanced"
    timeout: 3000
- takeScreenshot: tests/results/ios-debug/settings-subpages-advanced
- tapOn:
    id: "backButton"

# About
- tapOn:
    text: "About"
- extendedWaitUntil:
    visible:
      id: "settings-about"
    timeout: 3000
- takeScreenshot: tests/results/ios-debug/settings-subpages-about
- tapOn:
    id: "backButton"

# Display
