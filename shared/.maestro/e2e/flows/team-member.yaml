appId: keybase.ios
---
- runFlow: ../subflows/escape-to-tabs.yaml
- tapOn:
    text: "Teams"
    retryTapIfNoChange: false
- extendedWaitUntil:
    visible:
      id: "teams-list"
    timeout: 3000
- runFlow:
    when:
      visible:
        id: "teams-row"
    commands:
      - tapOn:
          id: "teams-row"
          index: 0
      - extendedWaitUntil:
          visible:
            id: "teams-member-list"
          timeout: 5000
      # Tap own username in the member list to open the member page
      - runFlow:
          when:
            visible:
              text: "${KB_SMOKE_USER}"
          commands:
            - tapOn:
                text: "${KB_SMOKE_USER}"
                index: 0
            - extendedWaitUntil:
                visible:
                  id: "teams-member-page"
                timeout: 5000
            - takeScreenshot: tests/results/ios-debug/team-member
            - tapOn:
                id: "backButton"
