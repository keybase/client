appId: keybase.ios
---
- runFlow: ../subflows/escape-to-tabs.yaml
- tapOn:
    text: "Teams"
- extendedWaitUntil:
    visible:
      id: "teams-list"
    timeout: 3000
- runFlow:
    when:
      visible:
        id: "teams-row"
    commands:
      - tapOn:
          id: "teams-row"
          index: 0
      - extendedWaitUntil:
          visible:
            text: "Members"
          timeout: 3000
      - tapOn:
          id: "backButton"
