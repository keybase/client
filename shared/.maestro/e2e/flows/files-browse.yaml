appId: keybase.ios
---
- runFlow: ../subflows/escape-to-tabs.yaml
# Navigate via Teams first to avoid ambiguity: "Files" exists both in the tab bar
# and as a settings item on the More tab. Teams is not a settings item.
- tapOn:
    text: "Teams"
- tapOn:
    text: "Files"
# KBFS needs time to connect before the browser renders
- extendedWaitUntil:
    visible:
      id: "files-browser"
    timeout: 3000
