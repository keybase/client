appId: keybase.ios
---
- runFlow: ../subflows/escape-to-tabs.yaml
# Navigate via Teams first to avoid ambiguity: "Files" also appears in the More tab menu
- tapOn:
    text: "Teams"
- tapOn:
    text: "Files"
- extendedWaitUntil:
    visible:
      id: "files-browser"
    timeout: 3000
- takeScreenshot: tests/results/ios-debug/files-folders-root

# Navigate into private folder (index 0)
- tapOn:
    id: "files-tlf-row"
    index: 0
- extendedWaitUntil:
    visible:
      id: "backButton"
    timeout: 3000
- takeScreenshot: tests/results/ios-debug/files-folders-private
- tapOn:
    id: "backButton"
- extendedWaitUntil:
    visible:
      id: "files-tlf-row"
    timeout: 3000

# Navigate into public folder (index 1)
- tapOn:
    id: "files-tlf-row"
    index: 1
- extendedWaitUntil:
    visible:
      id: "backButton"
    timeout: 3000
- takeScreenshot: tests/results/ios-debug/files-folders-public
- tapOn:
    id: "backButton"
- extendedWaitUntil:
    visible:
      id: "files-tlf-row"
    timeout: 3000

# Navigate into team folder (index 2)
- tapOn:
    id: "files-tlf-row"
    index: 2
- extendedWaitUntil:
    visible:
      id: "backButton"
    timeout: 3000
- takeScreenshot: tests/results/ios-debug/files-folders-team
- tapOn:
    id: "backButton"
- extendedWaitUntil:
    visible:
      id: "files-tlf-row"
    timeout: 3000
- takeScreenshot: tests/results/ios-debug/files-folders-back-to-root
