appId: keybase.ios

---

- runFlow: escape-to-tabs.yaml

# Tab bar is now visible — navigate to chat inbox
- tapOn:
    text: "Chat"

- extendedWaitUntil:
    visible:
      id: "inboxRow"
    timeout: 10000

- tapOn:
    id: "inboxRow"
    index: 0

- extendedWaitUntil:
    visible:
      id: "messageList"
    timeout: 10000
