appId: keybase.ios
waitToSettleTimeoutMs: 10

---

- launchApp:
    stopApp: true
    arguments:
      PERF_FPS_MONITOR: "true"

- extendedWaitUntil:
    visible:
      text: "Chats"
    timeout: 60000

- runFlow: ../subflows/navigate-to-chat.yaml

- repeat:
    times: 3
    commands:
      - swipe:
          id: "inboxList"
          direction: UP
          duration: 10

- repeat:
    times: 3
    commands:
      - swipe:
          id: "inboxList"
          direction: DOWN
          duration: 10

# Press Home to trigger app background → flushes profiler data
- pressKey: Home
