appId: keybase.ios
waitToSettleTimeoutMs: 10

---

- launchApp:
    stopApp: true
    arguments:
      PERF_FPS_MONITOR: "true"

# App auto-navigates to the target conversation on startup
- extendedWaitUntil:
    visible:
      id: "messageList"
    timeout: 120000

# Wait for messages to load
- waitForAnimationToEnd

# Swipe down = scroll back in time through chat history
- repeat:
    times: 10
    commands:
      - swipe:
          id: "messageList"
          direction: DOWN
          duration: 10

# Press Home to trigger app background → flushes profiler data
- pressKey: Home
